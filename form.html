<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Community: Registration Form</title>
</head>
<body>
    <head><h1>Tech Community</h1>
    <h3>Welcome to our tech community!</h3>

    <div>
        <h5>Navigation</h5>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="form.html">Form</a></li>
            <li><a href="multimedia.html">Multimedia</a></li>
        </ul>

    </div>
    </head>
    <main>
        <section class="form-container">
            <h3>Sign Up</h3>
             <form id="signupForm">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="interest" class="form-label">Area of Interest</label>
                    <select class="form-control" id="interest" required>
                        <option value="">Select an area</option>
                        <option value="Software Development">Software Development</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Cybersecurity">Cybersecurity</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>

            <!-- Display submitted data below the form -->
            <div id="result" class="result" style="display:none;"></div>
        </section>
    </main>
</body>
</html>
